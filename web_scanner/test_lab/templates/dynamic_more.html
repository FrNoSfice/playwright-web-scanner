<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动态更多内容页面</title>
</head>
<body>
    <h1>动态更多内容页面</h1>
    <p>该页面用于测试扫描器对动态链接和普通页面内容的识别能力。</p>

    <a href="/">返回首页</a>
    <a href="/dynamic/form">动态表单页面</a>

    <script>
        setTimeout(function () {
            const link = document.createElement("a");
            link.href = "/xss/dom";
            link.innerText = "延迟生成的 DOM 测试页面";
            document.body.appendChild(document.createElement("br"));
            document.body.appendChild(link);
        }, 500);
    </script>
</body>
</html>
