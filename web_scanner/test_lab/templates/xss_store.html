<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>存储型XSS测试</title></head>
<body>
  <h2>留言板</h2>
  <form method="post" action="/xss/store">
    <input type="text" name="nickname" placeholder="昵称">
    <textarea name="content" placeholder="留言内容"></textarea>
    <button type="submit">提交</button>
  </form>

  <hr>
  {% for row in rows %}
    <div>
      <strong>{{ row.nickname }}</strong>：
      <span>{{ row.content|safe }}</span>
    </div>
  {% endfor %}
</body>
</html>
