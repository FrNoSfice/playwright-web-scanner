<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>商品详情</title></head>
<body>
  <h2>商品查询</h2>
  <form method="get" action="/sqli/item">
    <input type="text" name="id" value="{{ item_id }}">
    <button type="submit">查询</button>
  </form>

  {% if row %}
    <div>
      <p>名称：{{ row.name }}</p>
      <p>价格：{{ row.price }}</p>
      <p>描述：{{ row.description }}</p>
    </div>
  {% endif %}

  {% if error %}
    <div style="color:red;">
      <h3>数据库错误</h3>
      <pre>{{ error }}</pre>
    </div>
  {% endif %}
</body>
</html>
