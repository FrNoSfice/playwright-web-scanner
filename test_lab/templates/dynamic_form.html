<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>动态表单</title></head>
<body>
  <h2>动态表单测试页</h2>
  <button id="showBtn">显示搜索表单</button>
  <div id="box"></div>

  <script>
    document.getElementById('showBtn').addEventListener('click', function () {
      document.getElementById('box').innerHTML = `
        <form method="get" action="/xss/reflect">
          <input type="text" name="q" placeholder="请输入搜索内容">
          <button type="submit">提交</button>
        </form>
      `;
    });
  </script>
</body>
</html>
