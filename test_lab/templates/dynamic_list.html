<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>动态商品列表</title></head>
<body>
  <h2>动态商品列表</h2>
  <div id="list">正在加载...</div>

  <script>
    setTimeout(() => {
      fetch('/api/products')
        .then(r => r.json())
        .then(data => {
          let html = '';
          data.forEach(item => {
            html += `<p><a href="/sqli/item?id=${item.id}">${item.name}</a> - ${item.price}</p>`;
          });
          document.getElementById('list').innerHTML = html;
        });
    }, 1500);
  </script>
</body>
</html>
